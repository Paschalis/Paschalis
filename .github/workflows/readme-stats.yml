name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=Paschalis&show_icons=true&include_all_commits=true&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=Paschalis&layout=compact&langs_count=6
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate UAV Telemetry pin
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=Paschalis&repo=UAV-TelemetryLink
          path: profile/pin-uav.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Hardware Login Key pin
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=Paschalis&repo=Hardware-Login-Key
          path: profile/pin-login.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "Paschalis"
          git config user.email "paschalis@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
